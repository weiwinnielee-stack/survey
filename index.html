<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問卷調查</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 90%;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #5b8dee;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 20px;
      color: #222;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>正在為您分配問卷…</h1>
    <p>請稍候，系統正在隨機引導您至問卷頁面。</p>
  </div>

  <script>
    const surveys = [
      "https://www.surveycake.com/s/pbMrz",
      "https://www.surveycake.com/s/7z6Me",
      "https://www.surveycake.com/s/LOnz7",
      "https://www.surveycake.com/s/xkKaW"
    ];

    const target = surveys[Math.floor(Math.random() * surveys.length)];

    // 稍微延遲讓畫面顯示，再跳轉
    setTimeout(() => {
      window.location.replace(target);
    }, 1200);
  </script>
</body>
</html>
