<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問卷調查</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 52px 44px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(80,100,200,0.10);
      max-width: 420px;
      width: 90%;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid #e4e9ff;
      border-top-color: #4f6ef7;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 10px; font-weight: 600; }
    p { font-size: 14px; color: #888; line-height: 1.7; }
    .full-msg { display: none; }
    .full-msg .icon { font-size: 48px; margin-bottom: 20px; }
    .full-msg h1 { color: #1a1a2e; }
    .full-msg p { color: #888; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <h1>正在為您分配問卷…</h1>
      <p>請稍候，系統正在隨機引導您至問卷頁面。</p>
    </div>
    <div id="full" class="full-msg">
      <div class="icon">🙏</div>
      <h1>問卷已額滿</h1>
      <p>所有問卷已達到回覆上限，<br>感謝您的參與！</p>
    </div>
  </div>

  <script>
    const BIN_ID = "6a1e8144da38895dfe7a38b5";
    const API_KEY = "$2a$10$aBOSPu0OMxxd4ERQmbB7RuC5bGMq1DshECABQ0Uu0cTvkbf1in2x6";
    const MAX = 25;

    const SURVEYS = ["pbMrz", "7z6Me", "LOnz7", "xkKaW"];
    const BASE_URL = "https://api.jsonbin.io/v3/b/";

    async function getCount() {
      const res = await fetch(`${BASE_URL}${BIN_ID}/latest`, {
        headers: { "X-Master-Key": API_KEY }
      });
      const data = await res.json();
      return data.record;
    }

    async function saveCount(record) {
      await fetch(`${BASE_URL}${BIN_ID}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": API_KEY
        },
        body: JSON.stringify(record)
      });
    }

    async function redirect() {
      try {
        const record = await getCount();

        // 找出尚未額滿的問卷
        const available = SURVEYS.filter(id => (record[id] || 0) < MAX);

        if (available.length === 0) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("full").style.display = "block";
          return;
        }

        // 從可用問卷中隨機選一份
        const chosen = available[Math.floor(Math.random() * available.length)];

        // 計數 +1
        record[chosen] = (record[chosen] || 0) + 1;
        await saveCount(record);

        // 跳轉
        window.location.replace(`https://www.surveycake.com/s/${chosen}`);
      } catch (e) {
        // 若 API 失敗，fallback 為純隨機（不計數）
        const fallback = SURVEYS[Math.floor(Math.random() * SURVEYS.length)];
        window.location.replace(`https://www.surveycake.com/s/${fallback}`);
      }
    }

    redirect();
  </script>
</body>
</html>
